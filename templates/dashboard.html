<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceGuide 대시보드</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #222539;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #48bfe3;
    --danger: #ff4d6d;
    --warn: #f4a261;
    --safe: #52b788;
    --text: #e2e8f0;
    --muted: #7c85a2;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── 헤더 ─────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .logo svg { width: 26px; height: 26px; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .session-input {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
  }
  .session-input label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .session-input input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    width: 140px;
  }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--safe);
    animation: pulse 2s infinite;
  }
  .pulse-dot.offline { background: var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.3); }
  }

  .status-text { font-size: 12px; color: var(--muted); }

  /* ── 메인 레이아웃 ────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
  }

  /* ── 왼쪽 패널 ────────────────────────────── */
  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  /* 통계 카드 */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 10px; color: var(--muted); }
  .stat-card.danger .stat-value  { color: var(--danger); }
  .stat-card.warn .stat-value    { color: var(--warn); }
  .stat-card.safe .stat-value    { color: var(--safe); }

  /* 탐지 물체 목록 */
  .objects-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .objects-list::-webkit-scrollbar { width: 4px; }
  .objects-list::-webkit-scrollbar-track { background: transparent; }
  .objects-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .object-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.25s ease;
    transition: border-color 0.2s;
  }
  .object-card:hover { border-color: var(--accent); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .object-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .object-icon.critical { background: rgba(255,77,109,0.15); }
  .object-icon.beep     { background: rgba(244,162,97,0.15); }
  .object-icon.safe     { background: rgba(82,183,136,0.15); }

  .object-info { flex: 1; min-width: 0; }
  .object-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .object-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }

  .risk-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .risk-badge.critical { background: rgba(255,77,109,0.2); color: var(--danger); }
  .risk-badge.beep     { background: rgba(244,162,97,0.2); color: var(--warn); }
  .risk-badge.silent   { background: rgba(82,183,136,0.2); color: var(--safe); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    padding: 40px;
    text-align: center;
  }
  .empty-state svg { opacity: 0.3; }

  /* ── 오른쪽: 지도 영역 ────────────────────── */
  .map-container {
    position: relative;
    background: var(--bg);
  }

  #map {
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* Leaflet 다크 테마 오버라이드 */
  .leaflet-tile { filter: brightness(0.85) saturate(0.8) hue-rotate(180deg) invert(1); }
  .leaflet-container { background: #111; }

  /* 지도 위 오버레이 카드 */
  .map-overlay {
    position: absolute;
    z-index: 400;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    backdrop-filter: blur(8px);
    font-size: 12px;
  }

  .map-overlay.top-right {
    top: 16px; right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 180px;
  }

  .gps-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }
  .gps-label { color: var(--muted); }
  .gps-value { font-family: monospace; color: var(--accent2); }

  .map-overlay.bottom-left {
    bottom: 24px; left: 16px;
    display: flex;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 11px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* 타임스탬프 */
  .last-update {
    position: absolute;
    z-index: 400;
    bottom: 24px; right: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  /* 토스트 알림 */
  #toast {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ── 헤더 ───────────────────────────────────────────── -->
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    VoiceGuide
  </div>

  <div class="header-right">
    <div class="session-input">
      <label>세션 ID (WiFi SSID)</label>
      <input id="sessionId" type="text" placeholder="__default__" value="__default__">
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="pulse-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">연결 중...</span>
    </div>
  </div>
</header>

<!-- ── 메인 ───────────────────────────────────────────── -->
<main>

  <!-- 왼쪽 패널 -->
  <div class="panel">

    <!-- 통계 -->
    <div class="panel-section">
      <div class="section-title">실시간 현황</div>
      <div class="stats-grid">
        <div class="stat-card danger">
          <div class="stat-value" id="statCritical">0</div>
          <div class="stat-label">위험</div>
        </div>
        <div class="stat-card warn">
          <div class="stat-value" id="statBeep">0</div>
          <div class="stat-label">주의</div>
        </div>
        <div class="stat-card safe">
          <div class="stat-value" id="statSafe">0</div>
          <div class="stat-label">안전</div>
        </div>
      </div>
    </div>

    <!-- 탐지 물체 목록 -->
    <div class="panel-section" style="border-bottom:none; padding-bottom:8px;">
      <div class="section-title">탐지된 물체</div>
    </div>
    <div class="objects-list" id="objectsList">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>탐지된 물체 없음<br>앱을 실행하세요</span>
      </div>
    </div>

  </div>

  <!-- 오른쪽: 지도 -->
  <div class="map-container">
    <div id="map"></div>

    <!-- GPS 정보 카드 -->
    <div class="map-overlay top-right" id="gpsCard">
      <div class="section-title" style="margin-bottom:8px;">GPS 위치</div>
      <div class="gps-row">
        <span class="gps-label">위도</span>
        <span class="gps-value" id="gpsLat">—</span>
      </div>
      <div class="gps-row">
        <span class="gps-label">경도</span>
        <span class="gps-value" id="gpsLng">—</span>
      </div>
      <div class="gps-row">
        <span class="gps-label">경로 포인트</span>
        <span class="gps-value" id="trackCount">0</span>
      </div>
    </div>

    <!-- 범례 -->
    <div class="map-overlay bottom-left">
      <div class="legend-item">
        <div class="legend-dot" style="background:#6c63ff;"></div> 현재 위치
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#48bfe3; opacity:0.6;"></div> 이동 경로
      </div>
    </div>

    <div class="last-update" id="lastUpdate">—</div>
  </div>

</main>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────────────
const POLL_MS     = 2000;   // 2초마다 폴링
const SERVER_BASE = window.location.origin;

// ── 지도 초기화 ───────────────────────────────────────
const map = L.map('map', { zoomControl: true, attributionControl: false })
  .setView([37.5665, 126.9780], 15);  // 기본 위치: 서울

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// 현재 위치 마커
const markerIcon = L.divIcon({
  html: `<div style="
    width:16px;height:16px;
    background:#6c63ff;
    border:3px solid #fff;
    border-radius:50%;
    box-shadow:0 0 0 4px rgba(108,99,255,0.3);
  "></div>`,
  iconSize: [16, 16],
  iconAnchor: [8, 8],
  className: ''
});

let marker    = null;
let trackLine = null;
let mapCentered = false;

// ── 아이콘 매핑 ───────────────────────────────────────
const ICONS = {
  '사람':   '🚶', '자전거':   '🚲', '자동차':   '🚗', '오토바이': '🏍',
  '버스':   '🚌', '기차':     '🚂', '트럭':     '🚛', '의자':     '🪑',
  '소파':   '🛋',  '침대':     '🛏',  '테이블':   '🪞', '계단':     '🪜',
  '신호등': '🚦', '칼':       '🔪', '가위':     '✂️',  '개':       '🐕',
  '고양이': '🐈',  '말':       '🐎', '화분':     '🪴', '병':       '🍶',
  '컵':     '☕',  '우산':     '☂️',  '배낭':     '🎒', '핸드백':   '👜',
  '여행가방':'🧳',  '책':       '📚',
};
function getIcon(name) { return ICONS[name] || '📦'; }

// ── 위험도 판단 ───────────────────────────────────────
function getRisk(obj) {
  const d  = obj.distance_m ?? 99;
  const kn = obj.class_ko ?? '';
  if (['자동차','오토바이','버스','트럭','기차','자전거'].includes(kn) && d < 8) return 'critical';
  if (['개','말','고양이'].includes(kn) && d < 3)  return 'critical';
  if (kn === '계단')  return 'critical';
  if (['칼','가위'].includes(kn) && d < 3)         return 'critical';
  if (d < 0.5)        return 'critical';
  if (d < 1.0)        return 'beep';
  return 'silent';
}

function riskLabel(r) {
  return { critical: '위험', beep: '주의', silent: '안전' }[r] ?? '—';
}

function distLabel(d) {
  if (d == null) return '—';
  if (d < 0.5)  return '바로 코앞';
  if (d < 1.0)  return '매우 가까이';
  if (d < 2.5)  return '가까이';
  if (d < 5.0)  return '조금 멀리';
  return '멀리';
}

// ── UI 렌더링 ─────────────────────────────────────────
function renderObjects(objects) {
  const list = document.getElementById('objectsList');

  if (!objects || objects.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>탐지된 물체 없음</span>
      </div>`;
    document.getElementById('statCritical').textContent = 0;
    document.getElementById('statBeep').textContent     = 0;
    document.getElementById('statSafe').textContent     = 0;
    return;
  }

  let critical = 0, beep = 0, safe = 0;
  const cards = objects.map(obj => {
    const risk = getRisk(obj);
    if (risk === 'critical') critical++;
    else if (risk === 'beep') beep++;
    else safe++;

    const icon = getIcon(obj.class_ko);
    const dir  = obj.direction ?? '—';
    const dist = distLabel(obj.distance_m);

    return `
      <div class="object-card">
        <div class="object-icon ${risk}">${icon}</div>
        <div class="object-info">
          <div class="object-name">${obj.class_ko ?? '알 수 없음'}</div>
          <div class="object-meta">
            <span>📍 ${dir}</span>
            <span>📏 ${dist}</span>
          </div>
        </div>
        <span class="risk-badge ${risk}">${riskLabel(risk)}</span>
      </div>`;
  });

  list.innerHTML = cards.join('');
  document.getElementById('statCritical').textContent = critical;
  document.getElementById('statBeep').textContent     = beep;
  document.getElementById('statSafe').textContent     = safe;
}

function renderGps(gps, track) {
  if (!gps) {
    document.getElementById('gpsLat').textContent = '—';
    document.getElementById('gpsLng').textContent = '—';
    return;
  }

  document.getElementById('gpsLat').textContent   = gps.lat.toFixed(6);
  document.getElementById('gpsLng').textContent   = gps.lng.toFixed(6);
  document.getElementById('trackCount').textContent = (track?.length ?? 0);

  const pos = [gps.lat, gps.lng];

  // 마커 이동
  if (!marker) {
    marker = L.marker(pos, { icon: markerIcon }).addTo(map);
  } else {
    marker.setLatLng(pos);
  }

  // 경로선 그리기
  if (track && track.length > 1) {
    const coords = track.map(p => [p.lat, p.lng]);
    if (!trackLine) {
      trackLine = L.polyline(coords, {
        color: '#48bfe3',
        weight: 3,
        opacity: 0.6,
        smoothFactor: 1
      }).addTo(map);
    } else {
      trackLine.setLatLngs(coords);
    }
  }

  // 첫 위치 수신 시 지도 이동
  if (!mapCentered && gps.lat !== 0) {
    map.setView(pos, 17);
    mapCentered = true;
  }
}

// ── 폴링 ─────────────────────────────────────────────
let prevObjectCount = 0;

async function poll() {
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');

  try {
    const res  = await fetch(`${SERVER_BASE}/status/${encodeURIComponent(sessionId)}`);
    const data = await res.json();

    dot.className  = 'pulse-dot';
    text.textContent = '연결됨';

    renderObjects(data.objects);
    renderGps(data.gps, data.track);

    // 새 물체 감지 시 토스트
    const currCount = (data.objects ?? []).length;
    if (currCount > prevObjectCount && prevObjectCount >= 0) {
      const names = (data.objects ?? []).map(o => o.class_ko).join(', ');
      if (names) showToast(`🔍 탐지: ${names}`);
    }
    prevObjectCount = currCount;

    document.getElementById('lastUpdate').textContent =
      '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  } catch (e) {
    dot.className  = 'pulse-dot offline';
    text.textContent = '서버 연결 끊김';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── 세션 ID 변경 시 리셋 ─────────────────────────────
document.getElementById('sessionId').addEventListener('change', () => {
  prevObjectCount = 0;
  mapCentered     = false;
  if (marker)    { map.removeLayer(marker);    marker    = null; }
  if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
});

// ── 시작 ─────────────────────────────────────────────
poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
